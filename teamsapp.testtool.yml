# yaml-language-server: $schema=https://aka.ms/teams-toolkit/v1.7/yaml.schema.json
# Visit https://aka.ms/teamsfx-v5.0-guide for details on this file
# Visit https://aka.ms/teamsfx-actions for details on actions
version: v1.7

deploy:
  # Install development tool(s)
  - uses: devTool/install
    with:
      testTool:
        version: ~0.2.1
        symlinkDir: ./devTools/teamsapptester

  # Run npm command
  - uses: cli/runNpmCommand
    with:
      args: install --no-audit

  # Generate runtime environment variables
  # NOTE: SECRET_-prefixed env vars are masked in Teams Toolkit logs.
  # The YAML maps SECRET_ vars → non-prefixed names the app code expects.
  - uses: file/createOrUpdateEnvironmentFile
    with:
      target: ./.localConfigs.testTool
      envs:
        TEAMSFX_NOTIFICATION_STORE_FILENAME: ${{TEAMSFX_NOTIFICATION_STORE_FILENAME}}
        TOTALAGILITY_ENDPOINT: ${{TOTALAGILITY_ENDPOINT}}
        TOTALAGILITY_API_KEY: ${{SECRET_TOTALAGILITY_API_KEY}}
        TOTALAGILITY_AGENT_NAME: ${{TOTALAGILITY_AGENT_NAME}}
        TOTALAGILITY_AGENT_ID: ${{SECRET_TOTALAGILITY_AGENT_ID}}
        TOTALAGILITY_TEST_USERNAME: ${{TOTALAGILITY_TEST_USERNAME}}
        TOTALAGILITY_USE_TEST_USER: ${{TOTALAGILITY_USE_TEST_USER}}
        # LLM tuning parameters (optional)
        TOTALAGILITY_TEMPERATURE: ${{TOTALAGILITY_TEMPERATURE}}
        TOTALAGILITY_USE_SEED: ${{TOTALAGILITY_USE_SEED}}
        TOTALAGILITY_SEED: ${{TOTALAGILITY_SEED}}
        # Conversation history
        CONVERSATION_HISTORY_MAX_ENTRIES: ${{CONVERSATION_HISTORY_MAX_ENTRIES}}
        # Proactive notifications
        NOTIFICATIONS_BEARER_TOKEN: ${{SECRET_NOTIFICATIONS_BEARER_TOKEN}}
        AZURE_STORAGE_CONNECTION_STRING: ${{SECRET_AZURE_STORAGE_CONNECTION_STRING}}
